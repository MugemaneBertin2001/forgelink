apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forgelink-dev

resources:
  - ../../base

nameSuffix: -dev

labels:
  - pairs:
      environment: development
    includeSelectors: true

# Development-specific patches - reduce replicas and resources
patches:
  # Reduce API replicas
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: forgelink-api
  # Reduce IDP replicas
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: forgelink-idp
  # Reduce Celery workers
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: forgelink-celery-worker
  # Reduce Kafka consumers
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: forgelink-kafka-consumer

# Use dev images
images:
  - name: forgelink-api
    newName: forgelink-api
    newTag: dev
  - name: forgelink-idp
    newName: forgelink-idp
    newTag: dev
  - name: forgelink-notification
    newName: forgelink-notification
    newTag: dev
