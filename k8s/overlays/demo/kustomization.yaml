apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forgelink

resources:
  - ../../base

nameSuffix: ""

labels:
  - pairs:
      environment: demo
    includeSelectors: true

# Demo-specific patches - single node, minimal resources
patches:
  # Replace base secrets
  - path: secrets.yaml

  # ============ REDUCE ALL REPLICAS TO 1 ============
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: StatefulSet

  # ============ REDUCE RESOURCE REQUESTS ============
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
    target:
      kind: StatefulSet
      name: postgresql

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
    target:
      kind: Deployment
      name: redis

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
    target:
      kind: StatefulSet
      name: kafka

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
    target:
      kind: StatefulSet
      name: tdengine

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
    target:
      kind: StatefulSet
      name: emqx

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
    target:
      kind: Deployment
      name: forgelink-api

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
    target:
      kind: Deployment
      name: forgelink-idp

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
    target:
      kind: Deployment
      name: forgelink-notification

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
    target:
      kind: Deployment
      name: forgelink-celery-worker

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
    target:
      kind: Deployment
      name: forgelink-celery-beat

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
    target:
      kind: Deployment
      name: forgelink-kafka-consumer

  # ============ USE NodePort for demo access ============
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30080
    target:
      kind: Service
      name: forgelink-api

  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30081
    target:
      kind: Service
      name: forgelink-idp

# Images - GHCR (multi-arch including ARM64 for Raspberry Pi)
images:
  - name: forgelink-api
    newName: ghcr.io/mugemanebertin2001/forgelink-api
    newTag: main
  - name: forgelink-idp
    newName: ghcr.io/mugemanebertin2001/forgelink-idp
    newTag: main
  - name: forgelink-notification
    newName: ghcr.io/mugemanebertin2001/forgelink-notification
    newTag: main
