apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forgelink

resources:
  - ../../base

# Replace base secrets with demo-specific values
patches:
  - path: secrets.yaml

nameSuffix: ""

labels:
  - pairs:
      environment: demo
    includeSelectors: true

# Demo-specific patches - single node, minimal resources for Raspberry Pi
patches:
  # ============ REDUCE ALL REPLICAS TO 1 ============
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: StatefulSet

  # ============ REDUCE RESOURCE REQUESTS (Pi-friendly) ============
  # PostgreSQL - minimal for demo
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
    target:
      kind: StatefulSet
      name: postgresql

  # Redis - minimal
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
    target:
      kind: Deployment
      name: redis

  # Kafka - reduced for Pi
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
    target:
      kind: StatefulSet
      name: kafka

  # TDengine - reduced
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
    target:
      kind: StatefulSet
      name: tdengine

  # EMQX - reduced
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
    target:
      kind: StatefulSet
      name: emqx

  # ForgeLink API
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
    target:
      kind: Deployment
      name: forgelink-api

  # ForgeLink IDP
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
    target:
      kind: Deployment
      name: forgelink-idp

  # Notification Service
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
    target:
      kind: Deployment
      name: forgelink-notification

  # Celery Worker
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
    target:
      kind: Deployment
      name: forgelink-celery-worker

  # Celery Beat
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "100m"
    target:
      kind: Deployment
      name: forgelink-celery-beat

  # Kafka Consumer
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
    target:
      kind: Deployment
      name: forgelink-kafka-consumer

  # ============ DISABLE HPA (not needed for single node) ============
  - patch: |-
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: forgelink-api-hpa
    target:
      kind: HorizontalPodAutoscaler

  # ============ USE NodePort for demo access ============
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30080
    target:
      kind: Service
      name: forgelink-api

  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30081
    target:
      kind: Service
      name: forgelink-idp

# Use GHCR images (multi-arch including ARM64)
images:
  - name: forgelink-api
    newName: ghcr.io/mugemanebertin/forgelink-api
    newTag: main
  - name: forgelink-idp
    newName: ghcr.io/mugemanebertin/forgelink-idp
    newTag: main
  - name: forgelink-notification
    newName: ghcr.io/mugemanebertin/forgelink-notification
    newTag: main
