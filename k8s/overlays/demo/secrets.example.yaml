# ForgeLink Demo Secrets Template
#
# Copy this file to secrets.yaml and fill in values:
#   cp secrets.example.yaml secrets.yaml
#
# Or run the deploy script which generates secrets automatically:
#   ./scripts/deploy.sh
#
# NEVER commit secrets.yaml to git!

apiVersion: v1
kind: Secret
metadata:
  name: forgelink-secrets
  namespace: forgelink
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "GENERATE_WITH_openssl_rand_base64_32"
  DJANGO_DB_PASSWORD: "your_secure_password"
  DJANGO_REDIS_PASSWORD: ""
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"

---
apiVersion: v1
kind: Secret
metadata:
  name: idp-secrets
  namespace: forgelink
type: Opaque
stringData:
  DB_PASSWORD: "your_secure_password"
  REDIS_PASSWORD: ""
  JWT_PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    GENERATE_WITH: openssl genrsa 2048
    -----END PRIVATE KEY-----
  JWT_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    GENERATE_WITH: openssl rsa -pubout
    -----END PUBLIC KEY-----

---
apiVersion: v1
kind: Secret
metadata:
  name: notification-secrets
  namespace: forgelink
type: Opaque
stringData:
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secrets
  namespace: forgelink
type: Opaque
stringData:
  POSTGRES_PASSWORD: "your_secure_password"
  FORGELINK_DB_PASSWORD: "your_secure_password"
  IDP_DB_PASSWORD: "your_secure_password"

---
apiVersion: v1
kind: Secret
metadata:
  name: emqx-secrets
  namespace: forgelink
type: Opaque
stringData:
  EMQX_DASHBOARD_PASSWORD: "your_secure_password"
  EMQX_MQTT_PASSWORD: "your_secure_password"
