apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forgelink-ingress
  labels:
    app.kubernetes.io/name: forgelink
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # WebSocket support for Socket.IO
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - forgelink.local
        - api.forgelink.local
        - idp.forgelink.local
      secretName: forgelink-tls
  rules:
    # Main API
    - host: api.forgelink.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forgelink-api
                port:
                  number: 8000
    # IDP
    - host: idp.forgelink.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forgelink-idp
                port:
                  number: 8080
    # Main domain routes to API
    - host: forgelink.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: forgelink-api
                port:
                  number: 8000
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: forgelink-api
                port:
                  number: 8000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: forgelink-api
                port:
                  number: 8000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: forgelink-idp
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forgelink-mqtt-ingress
  labels:
    app.kubernetes.io/name: forgelink
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mqtt.forgelink.local
      secretName: forgelink-mqtt-tls
  rules:
    - host: mqtt.forgelink.local
      http:
        paths:
          # MQTT over WebSocket
          - path: /mqtt
            pathType: Prefix
            backend:
              service:
                name: emqx
                port:
                  number: 8083
          # EMQX Dashboard
          - path: /dashboard
            pathType: Prefix
            backend:
              service:
                name: emqx
                port:
                  number: 18083
