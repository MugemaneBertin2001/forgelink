apiVersion: v1
kind: Secret
metadata:
  name: forgelink-secrets
  labels:
    app.kubernetes.io/name: forgelink
type: Opaque
stringData:
  # Django
  DJANGO_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  DJANGO_DB_USER: "forgelink"
  DJANGO_DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # TDengine
  DJANGO_TDENGINE_USER: "root"
  DJANGO_TDENGINE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # Redis
  DJANGO_REDIS_PASSWORD: ""

  # Kafka (if auth enabled)
  KAFKA_SASL_USERNAME: ""
  KAFKA_SASL_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: idp-secrets
  labels:
    app.kubernetes.io/name: forgelink-idp
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: "idp"
  SPRING_DATASOURCE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  SPRING_REDIS_PASSWORD: ""
  JWT_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_ACTUAL_PRIVATE_KEY
    -----END RSA PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-secrets
  labels:
    app.kubernetes.io/name: forgelink-notification
type: Opaque
stringData:
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secrets
  labels:
    app.kubernetes.io/name: postgresql
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  POSTGRES_FORGELINK_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  POSTGRES_IDP_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
---
apiVersion: v1
kind: Secret
metadata:
  name: emqx-secrets
  labels:
    app.kubernetes.io/name: emqx
type: Opaque
stringData:
  EMQX_DASHBOARD_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  # MQTT device credentials (for mTLS, use certs instead)
  MQTT_DEVICE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
