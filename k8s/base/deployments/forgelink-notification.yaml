apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgelink-notification
  labels:
    app.kubernetes.io/name: forgelink-notification
    app.kubernetes.io/component: notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgelink-notification
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgelink-notification
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka 9092; do
                echo "Waiting for Kafka..."
                sleep 2
              done
      containers:
        - name: notification
          image: forgelink-notification:latest
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: forgelink-config
            - secretRef:
                name: notification-secrets
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: SERVER_PORT
              value: "8081"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
