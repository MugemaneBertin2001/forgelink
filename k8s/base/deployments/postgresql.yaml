apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgresql
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: postgresql-init
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  labels:
    app.kubernetes.io/name: postgresql
data:
  01-init-databases.sql: |
    -- Create databases and users
    CREATE DATABASE forgelink;
    CREATE DATABASE idp;

    CREATE USER forgelink WITH ENCRYPTED PASSWORD 'forgelink_password';
    CREATE USER idp WITH ENCRYPTED PASSWORD 'idp_password';

    GRANT ALL PRIVILEGES ON DATABASE forgelink TO forgelink;
    GRANT ALL PRIVILEGES ON DATABASE idp TO idp;

    -- Connect to forgelink database and configure
    \c forgelink
    GRANT ALL ON SCHEMA public TO forgelink;

    -- Connect to idp database and configure
    \c idp
    GRANT ALL ON SCHEMA public TO idp;
