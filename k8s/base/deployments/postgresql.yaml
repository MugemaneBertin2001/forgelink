apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgresql
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_FORGELINK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: POSTGRES_FORGELINK_PASSWORD
            - name: POSTGRES_IDP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: POSTGRES_IDP_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: postgresql-init
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  labels:
    app.kubernetes.io/name: postgresql
data:
  01-init-databases.sh: |
    #!/bin/bash
    set -e

    # Read passwords from environment (set via secrets)
    FORGELINK_PASS="${POSTGRES_FORGELINK_PASSWORD:-forgelink_password}"
    IDP_PASS="${POSTGRES_IDP_PASSWORD:-idp_password}"

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      -- Create databases
      CREATE DATABASE forgelink;
      CREATE DATABASE idp;

      -- Create users with passwords from environment
      CREATE USER forgelink WITH ENCRYPTED PASSWORD '$FORGELINK_PASS';
      CREATE USER idp WITH ENCRYPTED PASSWORD '$IDP_PASS';

      -- Grant privileges
      GRANT ALL PRIVILEGES ON DATABASE forgelink TO forgelink;
      GRANT ALL PRIVILEGES ON DATABASE idp TO idp;
    EOSQL

    # Configure forgelink database
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "forgelink" <<-EOSQL
      GRANT ALL ON SCHEMA public TO forgelink;
    EOSQL

    # Configure idp database
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "idp" <<-EOSQL
      GRANT ALL ON SCHEMA public TO idp;
    EOSQL
