apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tdengine
  labels:
    app.kubernetes.io/name: tdengine
    app.kubernetes.io/component: timeseries-database
spec:
  serviceName: tdengine
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tdengine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tdengine
    spec:
      containers:
        - name: tdengine
          image: tdengine/tdengine:3.2.3.0
          ports:
            - containerPort: 6030
              name: taosd
            - containerPort: 6041
              name: rest
            - containerPort: 6043
              name: adapter
          env:
            - name: TAOS_FQDN
              value: "tdengine.forgelink.svc.cluster.local"
          volumeMounts:
            - name: tdengine-data
              mountPath: /var/lib/taos
            - name: tdengine-log
              mountPath: /var/log/taos
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            tcpSocket:
              port: 6030
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /rest/login/root/taosdata
              port: 6041
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: tdengine-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
    - metadata:
        name: tdengine-log
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
