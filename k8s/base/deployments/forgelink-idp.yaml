apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgelink-idp
  labels:
    app.kubernetes.io/name: forgelink-idp
    app.kubernetes.io/component: identity
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: forgelink-idp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgelink-idp
    spec:
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgresql 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
      containers:
        - name: idp
          image: forgelink-idp:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: forgelink-config
            - secretRef:
                name: idp-secrets
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: SERVER_PORT
              value: "8080"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
