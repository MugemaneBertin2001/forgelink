apiVersion: v1
kind: ConfigMap
metadata:
  name: forgelink-config
  labels:
    app.kubernetes.io/name: forgelink
data:
  # Factory settings
  FACTORY_TIMEZONE: "Africa/Kigali"
  FACTORY_PLANT: "steel-plant-kigali"

  # Django settings (allow all for K8s health probes)
  DJANGO_ALLOWED_HOSTS: "*"
  DJANGO_CSRF_TRUSTED_ORIGINS: "https://forgelink.local"
  DJANGO_DEBUG: "false"

  # Database connections (hosts only, credentials in secrets)
  DJANGO_DB_HOST: "postgresql.forgelink.svc.cluster.local"
  DJANGO_DB_PORT: "5432"
  DJANGO_DB_NAME: "forgelink"

  # TDengine
  DJANGO_TDENGINE_HOST: "tdengine.forgelink.svc.cluster.local"
  DJANGO_TDENGINE_PORT: "6041"
  DJANGO_TDENGINE_DATABASE: "forgelink_telemetry"

  # Redis
  DJANGO_REDIS_HOST: "redis.forgelink.svc.cluster.local"
  DJANGO_REDIS_PORT: "6379"
  DJANGO_REDIS_DJANGO_DB: "0"
  DJANGO_REDIS_CELERY_DB: "2"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka.forgelink.svc.cluster.local:9092"

  # IDP
  DJANGO_IDP_JWKS_URL: "http://forgelink-idp.forgelink.svc.cluster.local:8080/auth/jwks"

  # Jaeger
  DJANGO_JAEGER_ENDPOINT: "http://jaeger.forgelink.svc.cluster.local:14268/api/traces"

  # Spring IDP settings
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgresql.forgelink.svc.cluster.local:5432/idp"
  SPRING_REDIS_HOST: "redis.forgelink.svc.cluster.local"
  SPRING_REDIS_PORT: "6379"
  SPRING_REDIS_DATABASE: "1"

  # Notification service
  KAFKA_TOPICS_ALERTS: "alerts.notifications"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: emqx-config
  labels:
    app.kubernetes.io/name: emqx
data:
  EMQX_NAME: "forgelink-emqx"
  EMQX_CLUSTER__DISCOVERY_STRATEGY: "dns"
  EMQX_CLUSTER__DNS__NAME: "emqx-headless.forgelink.svc.cluster.local"
  EMQX_LISTENER__TCP__EXTERNAL: "1883"
  EMQX_LISTENER__SSL__EXTERNAL: "8883"
  EMQX_LISTENER__WS__EXTERNAL: "8083"
  EMQX_ALLOW_ANONYMOUS: "false"
