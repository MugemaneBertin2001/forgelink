openapi: 3.0.3
info:
  title: ForgeLink API
  version: 2.0.0
  description: Industrial IoT platform for steel manufacturing. Django owns every
    business object (assets, alerts, telemetry, simulator); the Spring IDP issues
    RS256 JWTs this API validates via JWKS.
paths:
  /api/alerts/alerts/:
    get:
      operationId: alerts_alerts_list
      description: |-
        ViewSet for alert management.

        Permissions:
        - GET: alerts.view
        - POST actions (acknowledge, resolve): alerts.acknowledge, alerts.resolve
      parameters:
      - in: query
        name: alert_type
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: severity
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - acknowledged
          - active
          - resolved
          - suppressed
        description: |-
          * `active` - Active
          * `acknowledged` - Acknowledged
          * `resolved` - Resolved
          * `suppressed` - Suppressed
      tags:
      - alerts
      security:
      - BearerAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAlertList'
          description: ''
    post:
      operationId: alerts_alerts_create
      description: |-
        ViewSet for alert management.

        Permissions:
        - GET: alerts.view
        - POST actions (acknowledge, resolve): alerts.acknowledge, alerts.resolve
      tags:
      - alerts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AlertRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AlertRequest'
      security:
      - BearerAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
          description: ''
  /api/alerts/alerts/{id}/:
    get:
      operationId: alerts_alerts_retrieve
      description: |-
        ViewSet for alert management.

        Permissions:
