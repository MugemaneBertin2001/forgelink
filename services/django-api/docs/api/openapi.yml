components:
  schemas:
    ActionEnum:
      enum:
      - create
      - read
      - update
      - delete
      - login
      - logout
      - export
      - acknowledge
      - resolve
      - execute
      - configure
      type: string
      description: |-
        * `create` - Create
        * `read` - Read
        * `update` - Update
        * `delete` - Delete
        * `login` - Login
        * `logout` - Logout
        * `export` - Export
        * `acknowledge` - Acknowledge
        * `resolve` - Resolve
        * `execute` - Execute
        * `configure` - Configure
    Alert:
      type: object
      description: Serializer for alerts.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        rule:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        device:
          type: string
          format: uuid
          readOnly: true
        device_id:
          type: string
          readOnly: true
        device_name:
          type: string
          readOnly: true
        area:
          type: string
          readOnly: true
        alert_type:
          type: string
          readOnly: true
        severity:
          type: string
          readOnly: true
        message:
          type: string
          readOnly: true
        value:
          type: number
          format: double
          readOnly: true
          nullable: true
        threshold:
          type: number
          format: double
          readOnly: true
          nullable: true
        unit:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/AlertStatusEnum'
        triggered_at:
          type: string
          format: date-time
          readOnly: true
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        acknowledged_by:
          type: string
          maxLength: 128
        resolved_at:
          type: string
          format: date-time
          nullable: true
        resolved_by:
          type: string
          maxLength: 128
        notified_slack:
          type: boolean
          readOnly: true
        notified_email:
          type: boolean
          readOnly: true
        notified_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        duration_seconds:
          type: integer
          description: Time since alert triggered.
          readOnly: true
      required:
      - alert_type
      - area
      - device
      - device_id
      - device_name
      - duration_seconds
      - id
      - message
      - notified_at
      - notified_email
      - notified_slack
      - rule
      - severity
      - threshold
      - triggered_at
      - unit
      - value
    AlertHistory:
      type: object
      description: Serializer for alert history.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        alert_id:
          type: string
          format: uuid
        rule_id:
          type: string
          format: uuid
          nullable: true
        device_id:
          type: string
          maxLength: 64
        plant:
          type: string
          maxLength: 64
        area:
          type: string
          maxLength: 64
        alert_type:
          type: string
          maxLength: 20
        severity:
          type: string
