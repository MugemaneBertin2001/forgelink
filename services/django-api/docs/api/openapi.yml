      - in: query
        name: rule_type
        schema:
          type: string
          enum:
          - quality_bad
          - rate_of_change
          - stale_data
          - threshold_high
          - threshold_low
          - threshold_range
        description: |-
          * `threshold_high` - High Threshold
          * `threshold_low` - Low Threshold
          * `threshold_range` - Out of Range
          * `rate_of_change` - Rate of Change
          * `stale_data` - Stale Data
          * `quality_bad` - Bad Quality
      - name: search
        required: false
        in: query
