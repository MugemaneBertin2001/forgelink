        value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          nullable: true
        threshold:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          nullable: true
        acknowledged:
          type: boolean
        acknowledged_by:
          type: string
          maxLength: 100
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        published_to_mqtt:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
      required:
      - event_type
      - message
      - severity
    SimulationEventSeverityEnum:
      enum:
      - critical
      - high
      - medium
      - low
      - info
      type: string
      description: |-
        * `critical` - Critical
        * `high` - High
        * `medium` - Medium
        * `low` - Low
        * `info` - Informational
    SimulationModeEnum:
      enum:
      - random_walk
      - sine_wave
      - step
      - ramp
      - constant
      - realistic
      type: string
      description: |-
        * `random_walk` - Random Walk
        * `sine_wave` - Sine Wave
        * `step` - Step Function
        * `ramp` - Ramp
        * `constant` - Constant
        * `realistic` - Realistic (Process-based)
    SimulationSession:
      type: object
      description: Serializer for simulation sessions.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/SimSessionStatusEnum'
          readOnly: true
        devices:
          type: array
          items:
            $ref: '#/components/schemas/SimulatedDeviceMinimal'
          readOnly: true
        plcs:
          type: array
          items:
            $ref: '#/components/schemas/SimulatedPLCMinimal'
          readOnly: true
        started_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        stopped_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        scheduled_start:
          type: string
          format: date-time
          nullable: true
        scheduled_stop:
          type: string
          format: date-time
          nullable: true
        duration_seconds:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Auto-stop after this duration
        duration:
          type: string
          nullable: true
          readOnly: true
        scenario:
          description: Predefined scenario configuration
        messages_sent:
          type: integer
          readOnly: true
        events_generated:
          type: integer
          readOnly: true
        faults_injected:
          type: integer
          readOnly: true
        error_count:
          type: integer
          readOnly: true
        last_error:
          type: string
          readOnly: true
        created_by:
          type: string
          maxLength: 100
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - devices
      - duration
      - error_count
      - events_generated
      - faults_injected
      - id
      - last_error
      - messages_sent
      - name
      - plcs
      - started_at
      - status
      - stopped_at
      - updated_at
    SimulationSessionRequest:
      type: object
      description: Serializer for simulation sessions.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
        device_ids:
          type: array
          items:
            type: string
            format: uuid
          writeOnly: true
        plc_ids:
          type: array
          items:
            type: string
            format: uuid
          writeOnly: true
        scheduled_start:
          type: string
          format: date-time
          nullable: true
        scheduled_stop:
          type: string
          format: date-time
          nullable: true
        duration_seconds:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Auto-stop after this duration
        scenario:
          description: Predefined scenario configuration
        created_by:
          type: string
          maxLength: 100
      required:
      - name
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256-signed JWT issued by the ForgeLink Spring IDP. Public keys
        are fetched from the IDP's JWKS endpoint and cached for one hour.
servers:
- url: http://localhost:8000
  description: Local dev
- url: https://api.forgelink.local
  description: Production
