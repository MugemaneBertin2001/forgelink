# Test configuration for ForgeLink IDP

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379
      database: 15

  flyway:
    enabled: false

jwt:
  private-key-path: /tmp/test-private.pem
  public-key-path: /tmp/test-public.pem
  access-token-expiry-hours: 1
  refresh-token-expiry-days: 1
  issuer: forgelink-idp-test
  key-id: test-key-1

logging:
  level:
    root: WARN
    com.forgelink: DEBUG
