spring:
  application:
    name: forgelink-idp

  # Database
  datasource:
    url: jdbc:postgresql://${IDP_DB_HOST:localhost}:${IDP_DB_PORT:5432}/${IDP_DB_NAME:idp}
    username: ${IDP_DB_USER:idp}
    password: ${IDP_DB_PASSWORD:idp_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: idp
    open-in-view: false

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_IDP_DB:1}

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: idp
    baseline-on-migrate: true

# Server
server:
  port: 8080

# JWT Configuration
jwt:
  private-key-path: ${IDP_JWT_PRIVATE_KEY_PATH:/app/secrets/jwt-private.pem}
  public-key-path: ${IDP_JWT_PUBLIC_KEY_PATH:/app/secrets/jwt-public.pem}
  access-token-expiry-hours: ${IDP_JWT_EXPIRY_HOURS:24}
  refresh-token-expiry-days: ${IDP_REFRESH_EXPIRY_DAYS:30}
  issuer: ${IDP_JWT_ISSUER:forgelink-idp}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: forgelink-idp

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    root: INFO
    com.forgelink: DEBUG
  # %X{correlation_id:-none} pulls the MDC key CorrelationIdFilter
  # sets per request. Without this any log emitted during auth is
  # orphaned — auth is the most common thing ops need to grep by ID.
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlation_id:-none}] [%thread] %logger{36} - %msg%n"

---
# Development profile
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    root: DEBUG
    org.springframework.security: DEBUG
