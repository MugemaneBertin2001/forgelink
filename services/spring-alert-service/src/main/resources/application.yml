spring:
  application:
    name: forgelink-alert-service

  datasource:
    url: jdbc:postgresql://${ALERT_DB_HOST:localhost}:${ALERT_DB_PORT:5432}/${ALERT_DB_NAME:alerts}
    username: ${ALERT_DB_USER:alerts}
    password: ${ALERT_DB_PASSWORD:alerts_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: alerts
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: forgelink-alert-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:forgelink}
    password: ${RABBITMQ_PASSWORD:forgelink_rabbitmq_dev}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${ALERT_IDP_JWKS_URL:http://localhost:8080/auth/jwks}

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: alerts
    baseline-on-migrate: true

server:
  port: 8082

grpc:
  server:
    port: 9090

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: forgelink-alert-service

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.forgelink: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
