spring:
  application:
    name: forgelink-asset-service

  datasource:
    url: jdbc:postgresql://${ASSET_DB_HOST:localhost}:${ASSET_DB_PORT:5432}/${ASSET_DB_NAME:assets}
    username: ${ASSET_DB_USER:assets}
    password: ${ASSET_DB_PASSWORD:assets_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: assets
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${ASSET_IDP_JWKS_URL:http://localhost:8080/auth/jwks}

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: assets
    baseline-on-migrate: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: forgelink-asset-service

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.forgelink: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
