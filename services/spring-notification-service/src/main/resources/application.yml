server:
  port: 8082

spring:
  application:
    name: forgelink-notification-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: forgelink-notification-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  # SMTP for the email notification channel. Defaults point at the
  # mailhog service wired into docker-compose.override.yml — local dev
  # gets a zero-config web inbox at http://localhost:8025. Production
  # replaces these with a real provider (Postmark, Mailgun, SES).
  mail:
    host: ${SMTP_HOST:mailhog}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from: ${SMTP_FROM:alerts@forgelink.local}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

# Kafka topics
kafka:
  topics:
    alerts: alerts.notifications

# Slack Webhook
slack:
  webhook-url: ${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/xxx/xxx/xxx}

# ForgeLink
forgelink:
  timezone: ${FACTORY_TIMEZONE:Africa/Kigali}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    root: INFO
    com.forgelink: DEBUG
    org.apache.kafka: WARN
  # Include the correlation_id MDC value inline with every log line so
  # ``docker compose logs -f forgelink-notification | grep <id>``
  # returns the complete trace for one alert across slack + email
  # dispatch. AlertEventConsumer puts the value into MDC after reading
  # the x-correlation-id Kafka header.
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlation_id:-none}] %logger{36} - %msg%n"
