server:
  port: 8082

spring:
  application:
    name: forgelink-notification-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: forgelink-notification-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# Kafka topics
kafka:
  topics:
    alerts: alerts.notifications

# Slack Webhook
slack:
  webhook-url: ${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/xxx/xxx/xxx}

# ForgeLink
forgelink:
  timezone: ${FACTORY_TIMEZONE:Africa/Kigali}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    root: INFO
    com.forgelink: DEBUG
    org.apache.kafka: WARN
