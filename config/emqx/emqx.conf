## Authentication
authentication = [
  {
    mechanism = "password_based"
    backend = "built_in_database"
    user_id_type = "username"
    password_hash_algorithm {
      name = "sha256"
      salt_position = "suffix"
    }
  }
]

## Authorization (ACL)
authorization {
  sources = [
    {
      type = "built_in_database"
      enable = true
    },
    {
      type = "file"
      enable = true
      path = "/opt/emqx/etc/acl.conf"
    }
  ]
  no_match = "deny"
  deny_action = "disconnect"
  cache {
    enable = true
    max_size = 32
    ttl = "1m"
  }
}

## Rate Limiting
listeners.tcp.default {
  limiter {
    client {
      rate = "100/s"
      burst = 0
    }
    messages {
      rate = "1000/s"
      burst = 0
    }
  }
}

## Session
mqtt {
  max_packet_size = "1MB"
  max_clientid_len = 256
  max_topic_levels = 10
  max_topic_alias = 65535
  retain_available = true
  wildcard_subscription = true
  shared_subscription = true
  exclusive_subscription = false
  ignore_loop_deliver = false
  strict_mode = false
}

## Retainer (for last-value caching)
retainer {
  enable = true
  backend {
    type = "built_in_database"
    storage_type = "disc"
    max_retained_messages = 100000
  }
  max_payload_size = "64KB"
  msg_expiry_interval = "0s"
  flow_control {
    batch_read_number = 0
    batch_deliver_number = 0
  }
}

## Logging
log {
  file_handlers.default {
    level = info
    file = "/opt/emqx/log/emqx.log"
    count = 10
    max_size = "50MB"
    formatter = "text"
  }
  console_handler {
    level = info
    enable = true
    formatter = "text"
  }
}

## Metrics
prometheus {
  push_gateway_server = ""
  interval = "15s"
  enable = true
}

## Telemetry
telemetry {
  enable = false
}
