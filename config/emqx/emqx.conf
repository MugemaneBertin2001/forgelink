## ForgeLink EMQX Configuration
## MQTT 5.0 Broker for Steel Factory IoT

## Node
node {
  name = "forgelink-emqx@127.0.0.1"
  cookie = "forgelink_emqx_secret_cookie"
  data_dir = "/opt/emqx/data"
}

## Cluster (single node for dev, expand for production)
cluster {
  name = "forgelink"
  discovery_strategy = "manual"
}

## Dashboard
dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "admin"
  default_password = "${EMQX_DASHBOARD__DEFAULT_PASSWORD}"
}

## MQTT Listeners
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024000
  proxy_protocol = false
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 1024000
  websocket.mqtt_path = "/mqtt"
}

