%% ForgeLink EMQX ACL Rules
%% Format: {permission, who, action, topics}
%% permission: allow | deny
%% who: all | {user, "username"} | {client, "clientid"} | {ipaddr, "ip"}
%% action: subscribe | publish | all
%% topics: list of topic patterns

%% ============================================
%% MQTT Bridge (internal service)
%% Full access to all forgelink topics
%% ============================================
{allow, {user, "bridge"}, all, ["forgelink/#"]}.
{allow, {user, "bridge"}, subscribe, ["$SYS/#"]}.

%% ============================================
%% Device Authentication Pattern
%% Devices can only publish to their own subtree
%% Topic: forgelink/<plant>/<area>/<line>/<cell>/<device_id>/<type>
%% ============================================

%% Melt Shop Devices
{allow, {user, "device-melt-shop"}, publish, ["forgelink/steel-plant-kigali/melt-shop/+/+/+/telemetry"]}.
{allow, {user, "device-melt-shop"}, publish, ["forgelink/steel-plant-kigali/melt-shop/+/+/+/status"]}.
{allow, {user, "device-melt-shop"}, publish, ["forgelink/steel-plant-kigali/melt-shop/+/+/+/events"]}.
{allow, {user, "device-melt-shop"}, subscribe, ["forgelink/steel-plant-kigali/melt-shop/+/+/+/commands"]}.

%% Continuous Casting Devices
{allow, {user, "device-continuous-casting"}, publish, ["forgelink/steel-plant-kigali/continuous-casting/+/+/+/telemetry"]}.
{allow, {user, "device-continuous-casting"}, publish, ["forgelink/steel-plant-kigali/continuous-casting/+/+/+/status"]}.
{allow, {user, "device-continuous-casting"}, publish, ["forgelink/steel-plant-kigali/continuous-casting/+/+/+/events"]}.
{allow, {user, "device-continuous-casting"}, subscribe, ["forgelink/steel-plant-kigali/continuous-casting/+/+/+/commands"]}.

%% Rolling Mill Devices
{allow, {user, "device-rolling-mill"}, publish, ["forgelink/steel-plant-kigali/rolling-mill/+/+/+/telemetry"]}.
{allow, {user, "device-rolling-mill"}, publish, ["forgelink/steel-plant-kigali/rolling-mill/+/+/+/status"]}.
{allow, {user, "device-rolling-mill"}, publish, ["forgelink/steel-plant-kigali/rolling-mill/+/+/+/events"]}.
{allow, {user, "device-rolling-mill"}, subscribe, ["forgelink/steel-plant-kigali/rolling-mill/+/+/+/commands"]}.

%% Finishing Devices
{allow, {user, "device-finishing"}, publish, ["forgelink/steel-plant-kigali/finishing/+/+/+/telemetry"]}.
{allow, {user, "device-finishing"}, publish, ["forgelink/steel-plant-kigali/finishing/+/+/+/status"]}.
{allow, {user, "device-finishing"}, publish, ["forgelink/steel-plant-kigali/finishing/+/+/+/events"]}.
{allow, {user, "device-finishing"}, subscribe, ["forgelink/steel-plant-kigali/finishing/+/+/+/commands"]}.

%% ============================================
%% Operator Access (read-only to all telemetry)
%% ============================================
{allow, {user, "operator"}, subscribe, ["forgelink/#"]}.
{deny, {user, "operator"}, publish, ["forgelink/#"]}.

%% ============================================
%% Admin Access (full control)
%% ============================================
{allow, {user, "admin"}, all, ["forgelink/#"]}.
{allow, {user, "admin"}, all, ["$SYS/#"]}.

%% ============================================
%% Simulator (for testing)
%% ============================================
{allow, {user, "simulator"}, all, ["forgelink/#"]}.

%% ============================================
%% Default: Deny all
%% ============================================
{deny, all, all, ["#"]}.
