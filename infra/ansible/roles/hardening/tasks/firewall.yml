---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow configured ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ ufw_allowed_ports }}"

# k3s internal communication (pod/service network)
- name: Allow k3s internal traffic (pods)
  community.general.ufw:
    rule: allow
    from_ip: "10.42.0.0/16"
    comment: "k3s pod network"

- name: Allow k3s internal traffic (services)
  community.general.ufw:
    rule: allow
    from_ip: "10.43.0.0/16"
    comment: "k3s service network"

- name: Enable ufw
  community.general.ufw:
    state: enabled
