---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: safe
  register: apt_upgrade

- name: Install system dependencies
  ansible.builtin.apt:
    name:
      - curl
      - openssl
      - git
      - jq
      - htop
      - iotop
      - unattended-upgrades
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Set hostname
  ansible.builtin.hostname:
    name: "forgelink-{{ group_names[0] | default('server') }}"

- name: Add hostname to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 forgelink-{{ group_names[0] | default('server') }}"

- name: Enable automatic security updates
  ansible.builtin.copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"

- name: Create swap file
  when: enable_swap | bool
  block:
    - name: Check if swap file exists
      ansible.builtin.stat:
        path: /swapfile
      register: swap_file

    - name: Create swap file
      when: not swap_file.stat.exists
      ansible.builtin.command: "fallocate -l {{ swap_size_mb }}M /swapfile"

    - name: Set swap file permissions
      ansible.builtin.file:
        path: /swapfile
        mode: "0600"
      when: not swap_file.stat.exists

    - name: Format swap file
      ansible.builtin.command: mkswap /swapfile
      when: not swap_file.stat.exists

    - name: Enable swap file
      ansible.builtin.command: swapon /swapfile
      when: not swap_file.stat.exists

    - name: Add swap to fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

- name: Reboot if kernel was updated
  ansible.builtin.reboot:
    reboot_timeout: 300
  when: apt_upgrade.changed and 'linux-image' in (apt_upgrade.stdout | default(''))
