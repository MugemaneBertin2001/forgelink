all:
  children:
    # ─── Home Lab (Raspberry Pi, local machines) ───────────────────
    homelab:
      hosts:
        pi:
          ansible_host: 192.168.1.50  # Change to your Pi's IP
          ansible_user: ubuntu         # or 'pi' for Raspberry Pi OS

    # ─── Cloud (Oracle Cloud, VPS) ─────────────────────────────────
    cloud:
      hosts:
        oracle:
          ansible_host: 0.0.0.0       # Replace with terraform output
          ansible_user: ubuntu

    # ─── Parent group ──────────────────────────────────────────────
    forgelink:
      children:
        homelab:
        cloud:
