version: "3.9"

# ============================================
# ForgeLink - Development Overrides
# ============================================
# This file automatically loads with `docker compose up`
# Adds hot-reload, debug settings, and dev conveniences.
#
# For local port conflicts (e.g., another project already running
# Postgres on 5432), add a `docker-compose.local.yml` — it is
# gitignored and will be loaded via
#   docker compose -f docker-compose.yml -f docker-compose.override.yml \
#                  -f docker-compose.local.yml up -d
# ============================================

services:
  # Django API - Development mode with hot reload
  forgelink-api:
    build:
      context: ./services/django-api
      dockerfile: Dockerfile
      target: development
    # Ensure Prometheus client multiproc directory exists before Django boots;
    # django_prometheus fails at import time if the dir is missing.
    command: >
      sh -c "mkdir -p /tmp/prometheus &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_LOG_LEVEL: DEBUG
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
    volumes:
      - ./services/django-api:/app
      - django_static:/app/staticfiles
    stdin_open: true
    tty: true

  # Spring IDP - Development mode
  # Remote debug is disabled by default because JAVA_TOOL_OPTIONS is inherited
  # by both Maven and the Spring Boot child JVM, causing double-bind on the
  # JDWP port. To enable, set JAVA_TOOL_OPTIONS at the child process level
  # (e.g., via MAVEN_OPTS or spring-boot.run.jvmArguments) instead.
  forgelink-idp:
    build:
      context: ./services/spring-idp
      dockerfile: Dockerfile
      target: development
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Clobber the Dockerfile-baked JAVA_TOOL_OPTIONS which starts a JDWP agent
      # on 5005 — Maven's fork inherits it and fails to re-bind. Remote debug
      # can be re-enabled via MAVEN_OPTS + spring-boot.run.jvmArguments instead.
      JAVA_TOOL_OPTIONS: ""
    ports:
      - "8080:8080"

  # Spring Notification Service - Development mode
  forgelink-notification-service:
    build:
      context: ./services/spring-notification-service
      dockerfile: Dockerfile
      target: development
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: ""

  # MQTT Bridge - Development mode with hot reload
  forgelink-mqtt-bridge:
    build:
      context: ./services/mqtt-bridge
      dockerfile: Dockerfile
      target: development
    # prometheus_client multiproc mode requires /tmp/prometheus to exist
    # before any metric object is constructed at import time.
    command: >
      sh -c "mkdir -p /tmp/prometheus &&
             python -m bridge"
    volumes:
      - ./services/mqtt-bridge:/app
    environment:
      LOG_LEVEL: DEBUG
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus

  # Celery Worker - background tasks for Django
  forgelink-celery-worker:
    build:
      context: ./services/django-api
      dockerfile: Dockerfile
      target: development
    container_name: forgelink-celery-worker
    hostname: forgelink-celery-worker
    command: celery -A apps.core worker -l DEBUG -Q default,telemetry,alerts,ai
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: apps.core.settings
    volumes:
      - ./services/django-api:/app
    networks:
      - forgelink-network
    depends_on:
      - redis
      - postgres
      - forgelink-api

  # Celery Beat - scheduled tasks
  forgelink-celery-beat:
    build:
      context: ./services/django-api
      dockerfile: Dockerfile
      target: development
    container_name: forgelink-celery-beat
    hostname: forgelink-celery-beat
    command: celery -A apps.core beat -l DEBUG
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: apps.core.settings
    volumes:
      - ./services/django-api:/app
    networks:
      - forgelink-network
    depends_on:
      - redis
      - forgelink-api

  # Kafka UI - development convenience
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.1
    container_name: forgelink-kafka-ui
    hostname: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: forgelink
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - forgelink-network
    depends_on:
      - kafka

  # Mailhog - local SMTP sink for email testing
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: forgelink-mailhog
    hostname: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - forgelink-network

volumes:
  django_static:
    name: forgelink-django-static

networks:
  forgelink-network:
    external: true
    name: forgelink-network
